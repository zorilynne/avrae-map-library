<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avrae Map Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#120e1c;
    --bg2:#0a0712;
    --panel:#1b1530;
    --panel-hi:#241c40;
    --ink:#f3ecff;
    --muted:#a99fc4;
    --line:rgba(176,107,255,.18);
    --gold:#ffbf5c;
    --gold2:#ff7a3c;
    --arcane:#4fd6ff;
    --magic:#b06bff;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(90% 60% at 50% -10%, rgba(176,107,255,.20), transparent 60%),
      radial-gradient(70% 50% at 100% 0%, rgba(79,214,255,.12), transparent 60%),
      radial-gradient(80% 70% at 0% 100%, rgba(255,138,60,.10), transparent 60%),
      linear-gradient(180deg,var(--bg),var(--bg2));
  }

  /* ---------- header ---------- */
  header{
    position:sticky;top:0;z-index:20;
    padding:22px clamp(16px,4vw,34px) 18px;
    background:linear-gradient(180deg,rgba(12,9,20,.92),rgba(12,9,20,.72));
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}

  /* ---------- account ---------- */
  .acct{position:absolute;top:18px;right:clamp(16px,4vw,34px);display:flex;gap:8px;align-items:center;z-index:25}
  .acct .who{font-size:.74rem;color:var(--muted);font-weight:600}
  .acct .who b{color:var(--gold)}
  .abtn{font-size:.74rem;font-weight:600;padding:8px 14px;border-radius:10px;cursor:pointer;
        background:rgba(27,21,48,.8);border:1px solid var(--line);color:var(--ink);transition:.16s}
  .abtn:hover{border-color:var(--magic)}
  .abtn.solid{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1230;border-color:transparent;font-weight:700}

  .modal{position:fixed;inset:0;z-index:80;display:grid;place-items:center;padding:20px;
         background:rgba(6,4,12,.78);backdrop-filter:blur(6px)}
  .modal .box{width:min(400px,100%);background:linear-gradient(180deg,var(--panel-hi),var(--panel));
              border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:0 30px 60px -28px #000}
  .modal h2{font-family:'Grenze Gotisch',serif;margin:0 0 4px;font-size:1.6rem}
  .modal p{margin:0 0 18px;font-size:.82rem;color:var(--muted)}
  .modal label{display:block;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;
               color:var(--muted);font-weight:600;margin:0 0 6px}
  .modal input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);
               background:rgba(10,7,18,.6);color:var(--ink);font-family:inherit;font-size:.9rem;
               outline:none;margin-bottom:12px}
  .modal input:focus{border-color:var(--magic)}
  .modal .err{color:#ff6b6b;font-size:.8rem;min-height:1.2em;margin:8px 0 0}
  .modal .row{display:flex;gap:8px;margin-top:6px}
  .modal .row .abtn{flex:1;text-align:center}

  /* ---------- favourite star + set menu ---------- */
  .star{position:absolute;top:11px;right:11px;z-index:3;width:32px;height:32px;border-radius:50%;
        border:none;cursor:pointer;background:rgba(10,7,18,.75);color:#6b6188;font-size:1rem;
        display:grid;place-items:center;transition:.16s}
  .star:hover{color:var(--gold);transform:scale(1.1)}
  .star.on{color:var(--gold);text-shadow:0 0 12px rgba(255,191,92,.8)}
  .addset{position:absolute;top:11px;right:50px;z-index:3;width:32px;height:32px;border-radius:50%;
          border:none;cursor:pointer;background:rgba(10,7,18,.75);color:#6b6188;font-size:1.1rem;
          display:grid;place-items:center;transition:.16s}
  .addset:hover{color:var(--arcane);transform:scale(1.1)}
  .addset.on{color:var(--arcane)}

  .setrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px}
  .setchip{font-size:.72rem;font-weight:600;padding:7px 13px;border-radius:999px;cursor:pointer;
           background:rgba(27,21,48,.6);border:1px solid var(--line);color:var(--muted);transition:.16s}
  .setchip:hover{color:var(--ink);border-color:var(--arcane)}
  .setchip[aria-pressed="true"]{background:var(--arcane);border-color:transparent;color:#08222b;font-weight:700}
  .setchip.fav[aria-pressed="true"]{background:var(--gold);color:#2a1d05}
  .setchip.new{border-style:dashed}
  h1{
    margin:0;font-family:'Grenze Gotisch',serif;font-weight:800;
    font-size:clamp(2rem,6vw,3.2rem);line-height:1;letter-spacing:.01em;
    background:linear-gradient(100deg,var(--gold) 10%,#ffe3a6 35%,var(--magic) 70%,var(--arcane));
    background-size:200% auto;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 20px rgba(176,107,255,.35));
    animation:shimmer 8s linear infinite;
  }
  @keyframes shimmer{to{background-position:200% center}}
  .tagline{
    font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);
    font-weight:600;
  }
  .tagline b{color:var(--gold);font-weight:700}

  .controls{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;align-items:center}
  .search{position:relative;flex:1 1 260px;min-width:220px}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--magic);fill:none;stroke-width:2}
  #search{
    width:100%;padding:13px 14px 13px 42px;border-radius:12px;
    border:1px solid var(--line);background:rgba(27,21,48,.75);color:var(--ink);
    font-size:.95rem;font-family:inherit;outline:none;transition:.2s;
  }
  #search::placeholder{color:var(--muted)}
  #search:focus{border-color:var(--magic);box-shadow:0 0 0 4px rgba(176,107,255,.14)}
  .count{
    font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
    font-weight:600;white-space:nowrap;padding-right:4px;
  }
  .count b{color:var(--ink)}

  .cats{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .cat{
    font-size:.72rem;font-weight:600;letter-spacing:.04em;
    padding:7px 13px 7px 11px;border-radius:999px;cursor:pointer;
    background:rgba(27,21,48,.6);border:1px solid var(--line);color:var(--muted);
    display:inline-flex;align-items:center;gap:7px;transition:.16s;
  }
  .cat .dot{width:8px;height:8px;border-radius:50%;background:var(--cc,var(--magic));box-shadow:0 0 8px var(--cc,var(--magic))}
  .cat:hover{color:var(--ink);border-color:var(--cc,var(--magic))}
  .cat[aria-pressed="true"]{color:var(--bg);background:var(--cc,var(--magic));border-color:transparent;font-weight:700}
  .cat[aria-pressed="true"] .dot{background:var(--bg);box-shadow:none}

  /* ---------- gallery ---------- */
  .gallery{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));
    gap:20px;padding:clamp(18px,4vw,34px);
  }
  .card{
    position:relative;border-radius:16px;overflow:hidden;
    background:linear-gradient(180deg,var(--panel-hi),var(--panel));
    border:1px solid var(--line);
    box-shadow:0 14px 30px -20px rgba(0,0,0,.9);
    transition:transform .22s ease,box-shadow .22s,border-color .22s;
    animation:rise .5s both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .card::after{
    content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
    box-shadow:inset 0 0 0 1px transparent;
    background:radial-gradient(120% 60% at 50% 0%,var(--cc-soft,rgba(176,107,255,.16)),transparent 60%);
    opacity:0;transition:opacity .22s;
  }
  .card:hover{transform:translateY(-6px);border-color:var(--cc,var(--magic));box-shadow:0 26px 50px -22px rgba(0,0,0,.95),0 0 30px -8px var(--cc-soft,rgba(176,107,255,.4))}
  .card:hover::after{opacity:1}

  .media{position:relative;height:172px;overflow:hidden;background:#0d0a18}
  .media :where(img,svg){width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
  .card:hover .media :where(img,svg){transform:scale(1.07)}
  .media::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(11,7,18,.85));z-index:1}
  .badge{
    position:absolute;top:11px;left:11px;z-index:2;
    font-size:.64rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    padding:5px 10px;border-radius:999px;color:#fff;
    background:var(--cc,var(--magic));box-shadow:0 4px 14px -4px var(--cc,var(--magic));
    display:inline-flex;align-items:center;gap:6px;
  }

  .body{padding:14px 15px 16px;position:relative;z-index:2}
  .name{
    margin:0 0 3px;font-family:'Grenze Gotisch',serif;font-weight:700;
    font-size:1.18rem;letter-spacing:.01em;line-height:1.15;
  }
  .meta{margin:0 0 10px;font-size:.76rem;color:var(--muted);display:flex;gap:10px;align-items:center}
  .meta .size{font-variant-numeric:tabular-nums;color:var(--cc,var(--magic));font-weight:600}

  .tags{display:flex;flex-wrap:wrap;gap:5px;margin:0 0 12px;padding:0;list-style:none}
  .tags li{
    font-size:.64rem;font-weight:600;letter-spacing:.03em;color:var(--muted);
    background:rgba(255,255,255,.05);border:1px solid var(--line);
    border-radius:999px;padding:3px 9px;cursor:pointer;transition:.14s;
  }
  .tags li:hover{color:var(--ink);border-color:var(--cc,var(--magic));background:var(--cc-soft,rgba(176,107,255,.18))}

  .copy{
    width:100%;padding:12px;border:none;border-radius:11px;cursor:pointer;
    font-family:inherit;font-size:.86rem;font-weight:700;letter-spacing:.02em;color:#1a1230;
    background:linear-gradient(135deg,var(--gold),var(--gold2));
    display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 8px 20px -10px var(--gold2);
    transition:transform .12s,box-shadow .2s,filter .2s;
  }
  .copy:hover{filter:brightness(1.08);box-shadow:0 12px 26px -10px var(--gold2)}
  .copy:active{transform:translateY(1px) scale(.99)}
  .copy.done{background:linear-gradient(135deg,#57e0a0,#2fb87a);color:#0a2417;box-shadow:0 8px 20px -10px #2fb87a}

  /* ---------- states ---------- */
  .state{
    grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--muted);
  }
  .state h2{font-family:'Grenze Gotisch',serif;font-size:1.6rem;color:var(--ink);margin:0 0 8px}
  .skeleton{height:250px;border-radius:16px;background:linear-gradient(100deg,var(--panel) 30%,var(--panel-hi) 50%,var(--panel) 70%);background-size:220% 100%;animation:sweep 1.3s linear infinite}
  @keyframes sweep{to{background-position:-220% 0}}

  .onboard{max-width:540px;margin:0 auto}
  .onboard .rune{font-size:2.8rem;line-height:1;color:var(--magic);filter:drop-shadow(0 0 20px rgba(176,107,255,.65));margin-bottom:10px}
  .onboard p{color:var(--muted);font-size:.92rem}
  .onboard b{color:var(--gold);font-weight:600}
  .onboard pre{
    text-align:left;background:rgba(10,7,18,.72);border:1px solid var(--line);
    border-radius:12px;padding:16px 18px;overflow:auto;margin:16px 0;
  }
  .onboard code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.82rem;color:var(--arcane);white-space:pre}
  .onboard .hint{font-size:.78rem;margin-top:18px;line-height:1.8}
  .schema-btn{display:inline-flex;width:auto;padding:11px 22px}

  .notice{
    margin:0;padding:11px clamp(16px,4vw,34px);text-align:center;
    background:rgba(255,138,60,.14);border-bottom:1px solid rgba(255,138,60,.3);
    font-size:.8rem;color:#ffd6a8;
  }
  .notice b{color:var(--gold)}

  /* ---------- toast ---------- */
  #toast{
    position:fixed;left:50%;bottom:26px;transform:translate(-50%,140%);
    z-index:50;max-width:min(90vw,520px);
    background:rgba(20,15,36,.96);border:1px solid var(--line);
    border-radius:14px;padding:14px 16px;box-shadow:0 20px 50px -18px #000;
    display:flex;gap:12px;align-items:flex-start;transition:transform .35s cubic-bezier(.2,1,.3,1);
    backdrop-filter:blur(8px);
  }
  #toast.show{transform:translate(-50%,0)}
  #toast .tick{width:26px;height:26px;flex:none;border-radius:50%;background:linear-gradient(135deg,#57e0a0,#2fb87a);display:grid;place-items:center;color:#0a2417;font-weight:900}
  #toast .tx{font-size:.82rem}
  #toast .tx b{display:block;margin-bottom:3px;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;font-size:.66rem}
  #toast code{font-family:ui-monospace,Menlo,Consolas,monospace;color:var(--arcane);word-break:break-all;font-size:.82rem}

  /* ---------- lightbox viewer ---------- */
  .media{cursor:zoom-in}
  #viewer{position:fixed;inset:0;z-index:90;background:rgba(4,3,10,.94);
          display:flex;flex-direction:column;backdrop-filter:blur(4px)}
  #viewer.hidden{display:none}
  .vtop{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
        padding:12px clamp(12px,3vw,22px);border-bottom:1px solid var(--line);background:rgba(12,9,20,.7)}
  .vtop h3{margin:0;font-family:'Grenze Gotisch',serif;font-weight:700;font-size:1.25rem}
  .vtop .vmeta{font-size:.74rem;color:var(--muted)}
  .vtop .vmeta b{color:var(--gold)}
  .vspacer{flex:1}
  .vbtn{font-size:.74rem;font-weight:600;padding:8px 13px;border-radius:9px;cursor:pointer;
        background:rgba(27,21,48,.85);border:1px solid var(--line);color:var(--ink);transition:.15s;
        display:inline-flex;align-items:center;gap:6px}
  .vbtn:hover{border-color:var(--magic)}
  .vbtn.on{background:var(--arcane);color:#08222b;border-color:transparent;font-weight:700}
  .vbtn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1230;border-color:transparent;font-weight:700}
  .vbtn.vstar.on{background:var(--gold);color:#2a1d05}

  .vstage{flex:1;position:relative;overflow:auto;display:grid;place-items:center;padding:18px}
  .vframe{position:relative;line-height:0;max-width:100%}
  .vframe img{max-width:100%;max-height:calc(100vh - 190px);display:block;border-radius:6px;
              box-shadow:0 20px 60px -20px #000}
  #vgrid{position:absolute;inset:0;pointer-events:none;display:none;border-radius:6px}
  #vgrid.on{display:block}

  .vnav{position:absolute;top:50%;transform:translateY(-50%);z-index:2;width:44px;height:64px;
        border:none;cursor:pointer;background:rgba(12,9,20,.75);color:var(--ink);font-size:1.4rem;
        border-radius:10px;transition:.15s}
  .vnav:hover{background:var(--magic);color:#150f24}
  .vprev{left:10px} .vnext{right:10px}

  .vbot{padding:10px clamp(12px,3vw,22px);border-top:1px solid var(--line);background:rgba(12,9,20,.7);
        display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:.76rem;color:var(--muted)}
  .vbot code{font-family:ui-monospace,Menlo,Consolas,monospace;color:var(--arcane);
             background:rgba(10,7,18,.7);padding:5px 9px;border-radius:6px;word-break:break-all}
  .vbot .gctl{display:flex;align-items:center;gap:6px}
  .vbot input[type=range]{width:120px;accent-color:var(--magic)}

  @media (max-width:640px){
    .vtop h3{font-size:1rem;width:100%}
    .vframe img{max-height:calc(100vh - 240px)}
  }

  a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--arcane);outline-offset:3px}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition:none!important}
    .card:hover,.copy:active{transform:none}
  }
</style>
</head>
<body>
<header>
  <div class="acct" id="acct">
    <span class="who" id="who"></span>
    <button class="abtn solid" id="signInBtn">Sign in</button>
    <button class="abtn hidden" id="signOutBtn">Sign out</button>
  </div>
  <div class="brand">
    <h1>Avrae Map Library</h1>
    <span class="tagline">Battle-map archive · <b>Avrae</b> ready</span>
  </div>
  <div class="controls">
    <div class="search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke-linecap="round"/></svg>
      <input type="text" id="search" placeholder="Search maps, categories…" autocomplete="off">
    </div>
    <span class="count"><b id="count">—</b> maps</span>
  </div>
  <div class="cats" id="cats" role="group" aria-label="Filter by category"></div>
  <div class="setrow hidden" id="setrow" role="group" aria-label="Your sets"></div>
</header>

<div class="modal hidden" id="signInModal">
  <div class="box">
    <h2>Sign in</h2>
    <p>Keeps your favourites and map sets across devices. Ask your DM for an account — you can browse and copy commands without one.</p>
    <label for="uName">Username</label>
    <input id="uName" autocomplete="username" autocapitalize="none">
    <label for="uPass">Password</label>
    <input id="uPass" type="password" autocomplete="current-password">
    <p class="err" id="uErr"></p>
    <div class="row">
      <button class="abtn" id="uCancel">Cancel</button>
      <button class="abtn solid" id="uGo">Sign in</button>
    </div>
  </div>
</div>

<p class="notice" id="notice" hidden></p>

<div id="gallery" class="gallery" aria-live="polite"></div>

<div id="toast" role="status" aria-live="polite">
  <div class="tick">✓</div>
  <div class="tx"><b>Copied to clipboard</b><code id="toastCmd"></code></div>
</div>

<div id="viewer" class="hidden" role="dialog" aria-modal="true" aria-label="Map viewer">
  <div class="vtop">
    <h3 id="vName">Map</h3>
    <span class="vmeta" id="vMeta"></span>
    <span class="vspacer"></span>
    <button class="vbtn vstar hidden" id="vStar" title="Favourite">★ Favourite</button>
    <button class="vbtn hidden" id="vSet" title="Add to a set">⊞ Add to set</button>
    <button class="vbtn" id="vGridBtn" title="Overlay the grid this map is sized for">▦ Grid</button>
    <button class="vbtn gold" id="vCopy">Copy Avrae command</button>
    <button class="vbtn" id="vClose" title="Close (Esc)">✕</button>
  </div>
  <div class="vstage">
    <button class="vnav vprev" id="vPrev" title="Previous (left arrow)">‹</button>
    <div class="vframe">
      <img id="vImg" alt="">
      <div id="vgrid"></div>
    </div>
    <button class="vnav vnext" id="vNext" title="Next (right arrow)">›</button>
  </div>
  <div class="vbot">
    <span class="gctl">
      <label for="vCols">Grid</label>
      <input type="range" id="vCols" min="4" max="80" step="1">
      <b id="vColsOut" style="color:var(--ink)"></b>
    </span>
    <code id="vCmd"></code>
    <span class="vspacer"></span>
    <span>Arrow keys to browse · Esc to close</span>
  </div>
</div>

<script>
/* =====================================================================
   AVRAE MAP LIBRARY
   ---------------------------------------------------------------------
   Data source: maps.json (array). Each entry:
     { "name": "...", "category": "Dungeon",
       "thumbnail": "<img …>" | "https://…/thumb.jpg",   // optional
       "full": "https://…/full.jpg",                      // used in command
       "size": "30x30" }
   Copies:  !map -bg "<full>" -mapsize <size>
   Categories auto-colour + auto-populate the filter row. No build step.
   ===================================================================== */

const gallery = document.getElementById('gallery');
const catsBar = document.getElementById('cats');
const searchEl = document.getElementById('search');
const countEl = document.getElementById('count');
const notice  = document.getElementById('notice');

let allMaps = [];
let active  = 'all';

/* ---- category → colour (keyword match, else stable hash) ---- */
const CAT_KEYS = [
  [['dungeon','crypt','tomb','sewer'], '#b06bff'],
  [['cave','cavern','mine','underdark'], '#6b8bff'],
  [['forest','wood','grove','jungle'], '#4fd88a'],
  [['town','city','village','street','market'], '#ffbf5c'],
  [['tavern','inn','house','interior','shop'], '#ff7a5c'],
  [['water','coast','sea','ocean','ship','boat','dock','river'], '#4fd6ff'],
  [['mountain','hill','cliff','peak'], '#c0a0ff'],
  [['desert','dune','sand'], '#ffd15c'],
  [['swamp','marsh','bog'], '#7fbf5c'],
  [['castle','keep','fort','tower','wall'], '#ff6b9d'],
  [['snow','tundra','ice','frozen','arctic'], '#8fd6ff'],
  [['temple','shrine','ruin','sanctum'], '#e0a94f'],
  [['hell','abyss','void','planar','fey','feywild'], '#c78aff'],
  [['battle','arena','combat','war'], '#ff5c5c'],
  [['road','path','wilderness','wild','field','plain'], '#9fd86a']
];
const PALETTE = ['#b06bff','#4fd6ff','#ffbf5c','#4fd88a','#ff6b9d','#ff8a3c','#6b8bff','#5fd6c0','#ffd15c','#c78aff'];
function catColor(cat){
  const c = (cat||'').toLowerCase();
  for(const [keys,col] of CAT_KEYS){ if(keys.some(k=>c.includes(k))) return col; }
  let h=0; for(let i=0;i<c.length;i++) h=(h*31+c.charCodeAt(i))>>>0;
  return PALETTE[h % PALETTE.length];
}
function soften(hex,a=.16){
  const n=parseInt(hex.slice(1),16);
  return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;
}

/* ---- procedural battlemap placeholder (no network needed) ---- */
function placeholder(cat){
  const c = catColor(cat);
  const label = (cat||'MAP').slice(0,2).toUpperCase();
  return `<svg viewBox="0 0 320 180" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#171126"/><stop offset="1" stop-color="#0c0916"/>
      </linearGradient>
      <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M20 0H0V20" fill="none" stroke="${c}" stroke-opacity="0.22" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="320" height="180" fill="url(#g)"/>
    <rect width="320" height="180" fill="url(#grid)"/>
    <circle cx="160" cy="90" r="120" fill="${c}" opacity="0.10"/>
    <text x="160" y="102" text-anchor="middle" font-family="Georgia,serif" font-weight="700"
          font-size="52" fill="${c}" opacity="0.55" letter-spacing="4">${label}</text>
  </svg>`;
}

/* ---- render ---- */
function mediaHTML(map){
  const t = map.thumbnail;
  if(typeof t === 'string' && t.trim().startsWith('<')) return t;          // raw <img>/<svg>
  if(typeof t === 'string' && t.trim())  return `<img src="${t}" alt="" loading="lazy">`;
  if(map.full)                           return `<img src="${map.full}" alt="" loading="lazy">`;
  return placeholder(map.category);                                        // generated fallback
}

function renderMaps(maps){
  gallery.innerHTML = '';
  if(!maps.length){
    gallery.innerHTML = `<div class="state"><h2>No maps found</h2><p>Try a different search or category.</p></div>`;
    return;
  }
  maps.forEach((map,i)=>{
    const col = catColor(map.category);
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.full = map.full;
    card.style.setProperty('--cc', col);
    card.style.setProperty('--cc-soft', soften(col,.4));
    card.style.animationDelay = (Math.min(i,14)*35)+'ms';
    card.innerHTML = `
      <div class="media">
        <span class="badge">${map.category||'Map'}</span>
        ${me.token ? `
          <button class="star ${me.favorites.includes(map.full)?'on':''}" title="Favourite" aria-label="Favourite">★</button>
          <button class="addset ${me.collections.some(c=>c.maps.includes(map.full))?'on':''}" title="Add to a set" aria-label="Add to a set">⊞</button>` : ''}
        ${mediaHTML(map)}
      </div>
      <div class="body">
        <h3 class="name">${map.name||'Untitled'}</h3>
        <p class="meta">${map.category||'—'} ${map.size?`<span class="size">${map.size}</span>`:''}</p>
        ${Array.isArray(map.tags)&&map.tags.length
          ? `<ul class="tags">${map.tags.map(t=>`<li data-tag="${t}">${t}</li>`).join('')}</ul>` : ''}
        <button class="copy" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
          Copy Avrae Command
        </button>
      </div>`;
    card.querySelector('.media').addEventListener('click', e => {
      if (e.target.closest('.star, .addset')) return;   // let those buttons do their job
      openViewer(map);
    });
    card.querySelector('.copy').addEventListener('click', e => copyMap(map, e.currentTarget));
    const starBtn = card.querySelector('.star');
    if (starBtn) starBtn.addEventListener('click', e => {
      e.stopPropagation();
      const now = toggleFav(map.full);
      starBtn.classList.toggle('on', now);
      if (me.view === 'fav' && !now) apply();
    });
    const setBtn = card.querySelector('.addset');
    if (setBtn) setBtn.addEventListener('click', e => { e.stopPropagation(); setMenu(map, setBtn); });
    card.querySelectorAll('.tags li').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        searchEl.value = chip.dataset.tag;
        window.scrollTo({top:0,behavior:'smooth'});
        apply();
      });
    });
    gallery.appendChild(card);
  });
}

/* ---- copy command (Avrae format preserved) ---- */
async function copyMap(map, btn){
  const cmd = `!map -bg "${map.full}" -mapsize ${map.size}`;
  let ok = false;
  try{
    await navigator.clipboard.writeText(cmd); ok = true;
  }catch{
    const ta=document.createElement('textarea'); ta.value=cmd; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{ ok = document.execCommand('copy'); }catch{}
    ta.remove();
  }
  if(btn){
    const orig = btn.innerHTML;
    btn.classList.add('done');
    btn.innerHTML = ok ? '✓ Copied!' : 'Press Ctrl+C';
    setTimeout(()=>{ btn.classList.remove('done'); btn.innerHTML = orig; }, 1600);
  }
  showToast(cmd);
}

let toastT;
function showToast(cmd){
  const t = document.getElementById('toast');
  document.getElementById('toastCmd').textContent = cmd;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(()=>t.classList.remove('show'), 3200);
}

/* ---- category filter row ---- */
function buildCats(maps){
  const counts = {};
  maps.forEach(m=>{ const c=m.category||'Uncategorized'; counts[c]=(counts[c]||0)+1; });
  const cats = Object.keys(counts).sort();
  catsBar.innerHTML = '';
  const mk = (key,label,col)=>{
    const b=document.createElement('button');
    b.className='cat'; b.dataset.key=key; b.textContent=label;
    b.setAttribute('aria-pressed', key===active);
    if(col){ b.style.setProperty('--cc',col); b.insertAdjacentHTML('afterbegin','<span class="dot"></span>'); }
    b.addEventListener('click',()=>{ active=key; [...catsBar.children].forEach(c=>c.setAttribute('aria-pressed',c.dataset.key===key)); apply(); });
    return b;
  };
  catsBar.appendChild(mk('all','All'));
  cats.forEach(c=>catsBar.appendChild(mk(c, `${c} · ${counts[c]}`, catColor(c))));
}

/* ---- search + filter ---- */
function apply(){
  const term = searchEl.value.trim().toLowerCase();
  const out = allMaps.filter(m=>{
    if (me.view === 'fav' && !me.favorites.includes(m.full)) return false;
    if (me.view.startsWith('c:')) {
      const c = me.collections.find(x => 'c:' + x.id === me.view);
      if (!c || !c.maps.includes(m.full)) return false;
    }
    const okCat = active==='all' || (m.category||'Uncategorized')===active;
    const tagBlob = Array.isArray(m.tags) ? m.tags.join(' ') : '';
    const okTerm = !term || `${m.name} ${m.category} ${tagBlob}`.toLowerCase().includes(term);
    return okCat && okTerm;
  });
  countEl.textContent = out.length;
  shownList = out;
  renderMaps(out);
}
searchEl.addEventListener('input', apply);

/* ---- boot ---- */
function boot(data){
  allMaps = Array.isArray(data) ? data : [];
  countEl.textContent = allMaps.length;
  if(!allMaps.length){ emptyLibrary(); return; }
  buildCats(allMaps);
  apply();
}

/* =====================================================================
   ACCOUNTS — favourites and personal map sets
   Viewers (not signed in) get the full gallery and copy button.
   Signed-in users additionally get a star per map and named sets.
   ===================================================================== */

const API = '';                       // same origin: /api/* is routed to the Worker
const me = { token: '', name: '', favorites: [], collections: [], view: 'all' };

/* Storage may be blocked (file://, blocked site data, some private modes).
   Sign-in must still work; only session persistence is lost. */
const store = {
  ok: true,
  get(k){ try { return localStorage.getItem(k); } catch { this.ok = false; return null; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch { this.ok = false; } },
  del(k){ try { localStorage.removeItem(k); } catch { this.ok = false; } },
};

const modal = $id('signInModal');
function $id(x){ return document.getElementById(x); }

async function userApi(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      ...(opts.headers || {}),
      ...(me.token ? { Authorization: 'Bearer ' + me.token } : {}),
      ...(opts.body ? { 'Content-Type': 'application/json' } : {}),
    },
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `${res.status}`);
  return data;
}

function paintAccount() {
  const on = Boolean(me.token);
  document.getElementById('who').innerHTML = on ? `signed in as <b>${me.name}</b>` : '';
  document.getElementById('signInBtn').classList.toggle('hidden', on);
  document.getElementById('signOutBtn').classList.toggle('hidden', !on);
  document.getElementById('setrow').classList.toggle('hidden', !on);
  if (on) paintSets();
}

function paintSets() {
  const bar = document.getElementById('setrow');
  bar.innerHTML = '';
  const mk = (key, label, cls) => {
    const b = document.createElement('button');
    b.className = 'setchip ' + (cls || '');
    b.textContent = label;
    b.dataset.key = key;
    b.setAttribute('aria-pressed', me.view === key);
    b.addEventListener('click', () => { me.view = me.view === key ? 'all' : key; paintSets(); apply(); });
    bar.appendChild(b);
    return b;
  };
  mk('all', 'All maps');
  mk('fav', `★ Favourites (${me.favorites.length})`, 'fav');
  me.collections.forEach((c) => {
    const b = mk('c:' + c.id, `${c.name} (${c.maps.length})`);
    b.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (confirm(`Delete the set "${c.name}"? The maps themselves are not affected.`)) {
        me.collections = me.collections.filter((x) => x.id !== c.id);
        if (me.view === 'c:' + c.id) me.view = 'all';
        saveMe(); paintSets(); apply();
      }
    });
  });
  const add = mk('new', '+ New set', 'new');
  add.setAttribute('aria-pressed', 'false');
  add.addEventListener('click', (e) => {
    e.stopPropagation();
    const name = prompt('Name this set (e.g. "Doomsgate quest", "Session 12"):');
    if (!name) return;
    me.collections.push({ id: 'c' + Math.random().toString(36).slice(2, 9), name: name.trim().slice(0, 60), maps: [] });
    me.view = 'all';
    saveMe(); paintSets(); apply();
  });
}

let saveT;
function saveMe() {
  if (!me.token) return;
  clearTimeout(saveT);
  saveT = setTimeout(async () => {
    try {
      await userApi('/api/u/save', {
        method: 'POST',
        body: JSON.stringify({ favorites: me.favorites, collections: me.collections }),
      });
    } catch (err) {
      showToast('Could not save: ' + err.message);
    }
  }, 700);
}

function toggleFav(url) {
  const i = me.favorites.indexOf(url);
  i === -1 ? me.favorites.push(url) : me.favorites.splice(i, 1);
  saveMe(); paintSets();
  return i === -1;
}

function setMenu(map, btn) {
  if (!me.collections.length) {
    alert('Make a set first — use "+ New set" under the category filters.');
    return;
  }
  const lines = me.collections.map((c, i) =>
    `${i + 1}. ${c.maps.includes(map.full) ? '✓ ' : ''}${c.name}`).join('\n');
  const pick = prompt(`Add or remove "${map.name}" from which set?\n\n${lines}\n\nEnter a number:`);
  const idx = Number(pick) - 1;
  if (!Number.isInteger(idx) || idx < 0 || idx >= me.collections.length) return;
  const c = me.collections[idx];
  const at = c.maps.indexOf(map.full);
  at === -1 ? c.maps.push(map.full) : c.maps.splice(at, 1);
  btn.classList.toggle('on', me.collections.some((x) => x.maps.includes(map.full)));
  saveMe(); paintSets();
  if (me.view.startsWith('c:')) apply();
}

/* ---- sign in / out ---- */
document.getElementById('signInBtn').addEventListener('click', () => {
  modal.classList.remove('hidden');
  document.getElementById('uName').focus();
});
document.getElementById('uCancel').addEventListener('click', () => modal.classList.add('hidden'));
modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.add('hidden'); });

async function doSignIn() {
  const err = document.getElementById('uErr');
  err.textContent = '';
  try {
    const res = await userApi('/api/u/login', {
      method: 'POST',
      body: JSON.stringify({
        username: document.getElementById('uName').value,
        password: document.getElementById('uPass').value,
      }),
    });
    me.token = res.token; me.name = res.username;
    store.set('mapUserToken', res.token);
    store.set('mapUserName', res.username);
    document.getElementById('uPass').value = '';
    modal.classList.add('hidden');
    await loadMe();
    paintAccount();
    apply();
  } catch (e2) {
    err.textContent = e2.message;
  }
}
document.getElementById('uGo').addEventListener('click', doSignIn);
document.getElementById('uPass').addEventListener('keydown', (e) => { if (e.key === 'Enter') doSignIn(); });

document.getElementById('signOutBtn').addEventListener('click', () => {
  me.token = ''; me.name = ''; me.favorites = []; me.collections = []; me.view = 'all';
  store.del('mapUserToken');
  store.del('mapUserName');
  paintAccount(); apply();
});

async function loadMe() {
  if (!me.token) return;
  try {
    const d = await userApi('/api/u/me');
    me.favorites = d.favorites || [];
    me.collections = d.collections || [];
  } catch {
    me.token = '';
    store.del('mapUserToken');
  }
}

(async function resumeUser() {
  const t = store.get('mapUserToken');
  if (!t) { paintAccount(); return; }
  me.token = t;
  me.name = store.get('mapUserName') || '';
  await loadMe();
  paintAccount();
  apply();
})();
/* =====================================================================
   MAP VIEWER — full-size preview with a grid overlay.
   Open to everyone, signed in or not: you need to see a map before you
   drop it on the table. Favourites and sets stay signed-in only.
   ===================================================================== */

let shownList = [];   // whatever apply() last rendered, for prev/next
let vIndex = -1;
let vGridOn = false;

function vEl(id){ return document.getElementById(id); }

function parseSize(s){
  const m = /^(\d{1,4})x(\d{1,4})$/i.exec(String(s||'').trim());
  return m ? { cols:+m[1], rows:+m[2] } : null;
}

function paintGrid(){
  const g = vEl('vgrid');
  const img = vEl('vImg');
  g.classList.toggle('on', vGridOn);
  if(!vGridOn || !img.clientWidth) return;
  const cols = Math.max(1, Number(vEl('vCols').value) || 1);
  const cell = img.clientWidth / cols;
  const rows = Math.max(1, Math.round(img.clientHeight / cell));
  vEl('vColsOut').textContent = `${cols} \u00d7 ${rows}`;
  g.style.backgroundImage =
    'linear-gradient(to right, rgba(79,214,255,.55) 1px, transparent 1px),' +
    'linear-gradient(to bottom, rgba(79,214,255,.55) 1px, transparent 1px)';
  g.style.backgroundSize = `${cell}px ${cell}px`;
}

function openViewer(map){
  const i = shownList.findIndex(m => m.full === map.full);
  vIndex = i === -1 ? 0 : i;
  renderViewer();
  vEl('viewer').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function renderViewer(){
  const map = shownList[vIndex];
  if(!map) return;
  const size = parseSize(map.size);

  vEl('vName').textContent = map.name || 'Untitled';
  vEl('vMeta').innerHTML =
    `${map.category||'\u2014'} \u00b7 <b>${map.size||'no size set'}</b>` +
    (Array.isArray(map.tags)&&map.tags.length ? ` \u00b7 ${map.tags.join(', ')}` : '') +
    ` &nbsp;(${vIndex+1} of ${shownList.length})`;
  vEl('vCmd').textContent = `!map -bg "${map.full}" -mapsize ${map.size}`;

  const img = vEl('vImg');
  img.src = map.full;                      // full resolution, not the thumbnail
  img.alt = map.name || '';
  img.onload = paintGrid;

  vEl('vCols').value = size ? size.cols : 30;
  vEl('vColsOut').textContent = map.size || '';

  const on = Boolean(me.token);
  const star = vEl('vStar'), set = vEl('vSet');
  star.classList.toggle('hidden', !on);
  set.classList.toggle('hidden', !on);
  if(on){
    const fav = me.favorites.includes(map.full);
    star.classList.toggle('on', fav);
    star.textContent = fav ? '\u2605 Favourited' : '\u2605 Favourite';
  }
  paintGrid();
}

function closeViewer(){
  vEl('viewer').classList.add('hidden');
  vEl('vImg').src = '';
  document.body.style.overflow = '';
}

function step(n){
  if(!shownList.length) return;
  vIndex = (vIndex + n + shownList.length) % shownList.length;
  renderViewer();
}

vEl('vClose').addEventListener('click', closeViewer);
vEl('vPrev').addEventListener('click', () => step(-1));
vEl('vNext').addEventListener('click', () => step(1));
vEl('vGridBtn').addEventListener('click', e => {
  vGridOn = !vGridOn;
  e.currentTarget.classList.toggle('on', vGridOn);
  paintGrid();
});
vEl('vCols').addEventListener('input', () => {
  vGridOn = true; vEl('vGridBtn').classList.add('on'); paintGrid();
});
vEl('vCopy').addEventListener('click', e => copyMap(shownList[vIndex], e.currentTarget));
vEl('vStar').addEventListener('click', e => {
  const map = shownList[vIndex];
  const now = toggleFav(map.full);
  e.currentTarget.classList.toggle('on', now);
  e.currentTarget.textContent = now ? '\u2605 Favourited' : '\u2605 Favourite';
  const card = [...document.querySelectorAll('.card')].find(c => c.dataset.full === map.full);
  if(card && card.querySelector('.star')) card.querySelector('.star').classList.toggle('on', now);
});
vEl('vSet').addEventListener('click', () => setMenu(shownList[vIndex], vEl('vSet')));

document.addEventListener('keydown', e => {
  if(vEl('viewer').classList.contains('hidden')) return;
  if(e.key === 'Escape') closeViewer();
  else if(e.key === 'ArrowLeft') step(-1);
  else if(e.key === 'ArrowRight') step(1);
});
window.addEventListener('resize', () => {
  if(!vEl('viewer').classList.contains('hidden')) paintGrid();
});
